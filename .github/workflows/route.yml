name: Update Route VVIP IPTUNNELS

on:
  push:
    paths:
      - 'config.json'
  schedule:
    - cron: "15 03 * * *"
  workflow_dispatch:

jobs:
  generate_and_commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: "Setup sing-box"
      run: |
          set -Eeuo pipefail
          LATEST_RELEASE_URL=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases | grep "browser_download_url.*linux_amd64\.deb" | head -n 1 | cut -d '"' -f 4)
          wget -O sing-box.deb $LATEST_RELEASE_URL
          sudo dpkg -i sing-box.deb

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compiling
      run: |
        python scripts/compile.py

    - name: Commit RULE-SET & README.md
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add README.md
        git add rule_set.json
        if ! git diff --cached --quiet; then
          git commit -m "Update RULE-SET & README.md with latest SRS files"
          git push origin main
        else
          echo "No changes to README.md or rule_set.json to commit."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Push changes to release branch
      run: |
        git clone -b release --depth 1 https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git release_branch || echo "Branch doesn't exist"
        
        cd release
        HAS_CHANGES=true
        if [ -d "../release_branch/.git" ]; then
          mv ../release_branch/.git .git
          git add .
          if git diff --cached --quiet; then
            HAS_CHANGES=false
          fi
        else
          git init
          git remote add origin https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git add .
        fi
        
        if [ "$HAS_CHANGES" = true ]; then
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout --orphan new_release
          git add .
          git commit -m "Update release branch VVIP IPTUNNELS"
          git push -f origin new_release:release
        else
          echo "No changes in release directory to commit."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}