name: Update Route VVIP IPTUNNELS

on:
  push:
    paths:
      - 'config.json'
  schedule:
    - cron: "15 03 * * *"
  workflow_dispatch:

jobs:
  generate_and_commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Sing-box
      run: |
        echo "Installing sing-box..."
        curl -fsSL https://get.sing-box.app/install.sh | sudo bash || echo "Failed to install sing-box"
        
        if command -v sing-box &> /dev/null; then
          sing-box version
        else
          echo "Attempting to download latest sing-box pre-compiled binary..."
          VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -LO "https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${VERSION}-linux-amd64.tar.gz"
          sudo mv "sing-box-${VERSION}-linux-amd64/sing-box" /usr/local/bin/
          sing-box version
        fi

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compiling
      run: |
        python scripts/compile.py

    - name: Commit RULE-SET & README.md
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add README.md
        git add rule_set.json
        if ! git diff --cached --quiet; then
          git commit -m "Update RULE-SET & README.md with latest SRS files"
          git push origin main
        else
          echo "No changes to README.md or rule_set.json to commit."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Push changes to release branch
      run: |
        git clone -b release --depth 1 https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git release_branch || echo "Branch doesn't exist"
        
        cd release
        HAS_CHANGES=true
        if [ -d "../release_branch/.git" ]; then
          mv ../release_branch/.git .git
          git add .
          if git diff --cached --quiet; then
            HAS_CHANGES=false
          fi
        else
          git init
          git remote add origin https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git add .
        fi
        
        if [ "$HAS_CHANGES" = true ]; then
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout --orphan new_release
          git add .
          git commit -m "Update release branch VVIP IPTUNNELS"
          git push -f origin new_release:release
        else
          echo "No changes in release directory to commit."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}